<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometry Dash 3D | Corrida Infinita</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', 'Montserrat', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 100;
            pointer-events: none;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 14px;
            border-left: 4px solid #ffaa00;
        }
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            z-index: 100;
            pointer-events: none;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00aaff;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            font-weight: bold;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            font-family: monospace;
            border: 2px solid #ff5500;
            box-shadow: 0 0 30px rgba(255,85,0,0.5);
            pointer-events: auto;
            display: none;
        }
        #game-over h1 {
            margin: 0 0 10px;
            font-size: 48px;
            color: #ffaa44;
        }
        #restart-btn {
            background: #ff6600;
            border: none;
            color: white;
            font-size: 24px;
            padding: 10px 25px;
            margin-top: 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        #restart-btn:hover {
            background: #ffaa33;
            transform: scale(1.05);
        }
        .instruction {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #score-board { font-size: 18px; top: 10px; right: 10px; }
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-panel { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ⚡ GEOMETRY DASH 3D ⚡
    </div>
    <div id="score-board">
        SCORE: <span id="score-value">0</span>
    </div>
    <div id="controls-panel">
        🖱️ CLIQUE / ESPAÇO / TOQUE → PULAR | 🌟 DESVIE DOS OBSTÁCULOS 3D
    </div>
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Seu Recorde: <span id="final-score">0</span></p>
        <button id="restart-btn">▶ JOGAR NOVAMENTE</button>
    </div>
    <div class="instruction">
        🎵 Estilo Geometry Dash | Corrida em 3D
    </div>

    <!-- Import Three.js e add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Configuração da cena 3D estilo Geometry Dash ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // névoa para profundidade

        // Câmera em perspectiva (3D)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // sombras para efeito 3D
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // CSS2DRenderer para texto flutuante simples (score 3D opcional)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Iluminação dramática 3D ---
        // Luz ambiente
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        // Luz principal direcional
        const dirLight = new THREE.DirectionalLight(0xffcc88, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        // Luz de preenchimento colorida
        const fillLight = new THREE.PointLight(0x2266ff, 0.5);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        // Luz de chão vibrante
        const groundGlow = new THREE.PointLight(0xff44aa, 0.4);
        groundGlow.position.set(0, -1, 0);
        scene.add(groundGlow);
        
        // Efeito de brilho na pista (stripes)
        const backLight = new THREE.PointLight(0xffaa33, 0.6);
        backLight.position.set(0, 1.5, -5);
        scene.add(backLight);

        // --- Pista 3D estilizada (Geometry Dash vibes) ---
        // Plataforma principal (chão)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2c2f4a, roughness: 0.4, metalness: 0.7 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 100), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Pista com faixas neon (linhas laterais)
        const trackLineMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x441122 });
        for (let i = -40; i <= 40; i += 2) {
            const leftStripe = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.5), trackLineMat);
            leftStripe.position.set(-2.2, -0.4, i);
            leftStripe.castShadow = true;
            const rightStripe = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.5), trackLineMat);
            rightStripe.position.set(2.2, -0.4, i);
            rightStripe.castShadow = true;
            scene.add(leftStripe);
            scene.add(rightStripe);
        }
        
        // Adicionar marcadores de pista (cubos luminosos no chão)
        const markerMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x0088aa });
        for (let z = -35; z <= 35; z += 3) {
            const marker = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.4), markerMat);
            marker.position.set(0, -0.4, z);
            marker.castShadow = true;
            scene.add(marker);
        }
        
        // Laterais com glow (tubos neon)
        const neonMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288 });
        const leftRail = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 100), neonMat);
        leftRail.position.set(-3.2, 0.2, 0);
        leftRail.castShadow = true;
        const rightRail = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 100), neonMat);
        rightRail.position.set(3.2, 0.2, 0);
        rightRail.castShadow = true;
        scene.add(leftRail);
        scene.add(rightRail);
        
        // --- Jogador: cubo saltitante com geometria estilosa ---
        const playerGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200, metalness: 0.8 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        player.receiveShadow = true;
        player.position.set(0, 0.2, 0);
        scene.add(player);
        
        // Adicionar um "olho" ou detalhe para dar charme
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88aaff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        leftEye.position.set(-0.25, 0.25, 0.36);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        rightEye.position.set(0.25, 0.25, 0.36);
        player.add(leftEye);
        player.add(rightEye);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        leftPupil.position.set(-0.25, 0.2, 0.45);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        rightPupil.position.set(0.25, 0.2, 0.45);
        player.add(leftPupil);
        player.add(rightPupil);
        
        // Efeito de brilho em volta do player (ponto de luz)
        const playerGlow = new THREE.PointLight(0xffaa66, 0.8, 5);
        player.add(playerGlow);
        
        // --- Obstáculos 3D (geometria dash: spikes, cubos, pirâmides) ---
        const obstacles = [];
        
        // Função para criar obstáculo aleatório em posição Z (distância)
        function createObstacle(zPos, type = null) {
            let mesh;
            const types = ['spike', 'cube', 'pyramid'];
            const chosen = type || types[Math.floor(Math.random() * types.length)];
            const color = 0xff3366;
            const emissiveColor = 0x441122;
            
            if (chosen === 'spike') {
                const spikeGeo = new THREE.ConeGeometry(0.5, 0.9, 4);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff5533, emissive: 0x551100 });
                mesh = new THREE.Mesh(spikeGeo, mat);
                mesh.position.y = -0.1;
                mesh.rotation.y = Math.PI/4;
            } else if (chosen === 'pyramid') {
                const pyramidGeo = new THREE.CylinderGeometry(0, 0.65, 0.8, 4);
                const mat = new THREE.MeshStandardMaterial({ color: 0xdd44aa, emissive: 0x331122 });
                mesh = new THREE.Mesh(pyramidGeo, mat);
                mesh.position.y = -0.1;
            } else {
                const cubeGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
                const mat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x004466 });
                mesh = new THREE.Mesh(cubeGeo, mat);
                mesh.position.y = 0;
            }
            mesh.position.x = 0;
            mesh.position.z = zPos;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return { mesh, type: chosen, active: true };
        }
        
        // Sistema de geração infinita de obstáculos
        let nextObstacleZ = -12;
        const OBSTACLE_SPACING = 2.5;
        const MAX_OBSTACLES = 15;
        
        function generateObstaclesUntil(zLimit) {
            while (nextObstacleZ > zLimit) {
                // Espaçamento variável para dar dinamismo
                const variation = (Math.random() - 0.5) * 0.8;
                const spacing = OBSTACLE_SPACING + variation;
                nextObstacleZ -= spacing;
                if (nextObstacleZ > -45) { // limite de geração
                    const obs = createObstacle(nextObstacleZ);
                    obstacles.push(obs);
                } else {
                    break;
                }
            }
            // remover obstáculos muito atrás (para performance)
            for (let i = obstacles.length-1; i >= 0; i--) {
                if (obstacles[i].mesh.position.z > 12) {
                    scene.remove(obstacles[i].mesh);
                    obstacles.splice(i,1);
                }
            }
        }
        
        // Estado do jogo
        let isGameOver = false;
        let score = 0;
        let speed = 5.5;      // velocidade de deslocamento da pista / obstáculos
        let playerY = 0.2;
        let isJumping = false;
        let jumpVelocity = 0;
        const GRAVITY = 18;
        const JUMP_POWER = 5.2;
        let groundY = 0.2;
        
        // Controle de pulo
        const keys = { space: false };
        
        function jump() {
            if (isGameOver) return;
            if (!isJumping && playerY <= groundY + 0.05) {
                isJumping = true;
                jumpVelocity = JUMP_POWER;
                // efeito sonoro visual (pequeno flash)
                playerGlow.intensity = 1.5;
                setTimeout(() => { if(playerGlow) playerGlow.intensity = 0.8; }, 150);
            }
        }
        
        // Eventos de entrada (clique, toque, espaço)
        window.addEventListener('click', (e) => {
            // Evita clicar no botão de restart quando visível
            if (isGameOver) return;
            jump();
        });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isGameOver) return;
                jump();
            }
        });
        window.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            jump();
            e.preventDefault();
        });
        
        // --- Elementos decorativos: particulas e estrelas 3D (efeito dash) ---
        const starField = [];
        const starGeo = new THREE.SphereGeometry(0.05, 4, 4);
        for (let i = 0; i < 300; i++) {
            const starMat = new THREE.MeshStandardMaterial({ color: 0xaaffff, emissive: 0x4488aa });
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set((Math.random() - 0.5) * 40, Math.random() * 8 + 1, (Math.random() - 0.5) * 80 - 30);
            star.castShadow = false;
            scene.add(star);
            starField.push(star);
        }
        
        // Anéis giratórios (estilo dash)
        const ringGeo = new THREE.TorusGeometry(0.6, 0.08, 32, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff55ff, emissive: 0xff2288 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(0, 1.2, -3);
        scene.add(ring);
        
        // Chão com efeito de grid translúcido (para profundidade)
        const gridHelper = new THREE.GridHelper(40, 30, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.48;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // Câmera dinâmica que segue o jogador em Z e levemente em Y
        function updateCamera() {
            // A câmera segue a posição do jogador em Z com um offset
            const targetZ = player.position.z;
            // suavizar
            camera.position.z += (targetZ - 3 - camera.position.z) * 0.1;
            camera.position.x += (0 - camera.position.x) * 0.05;
            camera.position.y += (3.2 + Math.sin(Date.now() * 0.008) * 0.1 - camera.position.y) * 0.05;
            camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z - 2);
        }
        
        // Atualização da pontuação e velocidade progressiva
        let lastScoreUpdate = 0;
        
        function updateGame(deltaTime) {
            if (isGameOver) return;
            
            // Aumentar pontuação com o tempo
            score += deltaTime * 8;
            document.getElementById('score-value').innerText = Math.floor(score);
            
            // Aumentar velocidade gradualmente (dificuldade)
            if (speed < 12) {
                speed += deltaTime * 0.8;
            }
            
            // Movimentação dos obstáculos em direção ao jogador (na verdade move o mundo)
            // Para manter sensação 3D, movemos os obstáculos e os elementos decorativos em Z+
            const moveDelta = speed * deltaTime;
            // Atualizar posição de obstáculos
            for (let obs of obstacles) {
                obs.mesh.position.z += moveDelta;
            }
            // Atualizar elementos decorativos (estrelas)
            for (let star of starField) {
                star.position.z += moveDelta * 0.6;
                if (star.position.z > 15) star.position.z = -35;
                if (star.position.z < -40) star.position.z = 15;
            }
            // anel rotatório
            ring.position.z += moveDelta;
            if (ring.position.z > 8) ring.position.z = -12;
            ring.rotation.x += 0.03;
            ring.rotation.y += 0.02;
            
            // Atualizar marcadores do chão (não precisa, mas mantém efeito)
            
            // Gerar novos obstáculos à frente
            const farthestZ = obstacles.length ? Math.min(...obstacles.map(o => o.mesh.position.z)) : -15;
            generateObstaclesUntil(farthestZ - 3);
            
            // Colisão do jogador com obstáculos (detecção de bounding box)
            const playerBox = new THREE.Box3().setFromObject(player);
            for (let obs of obstacles) {
                if (!obs.active) continue;
                const obsBox = new THREE.Box3().setFromObject(obs.mesh);
                if (playerBox.intersectsBox(obsBox)) {
                    isGameOver = true;
                    document.getElementById('final-score').innerText = Math.floor(score);
                    document.getElementById('game-over').style.display = 'block';
                    // efeito de explosão visual simples
                    const explosionMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200 });
                    const explosion = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), explosionMat);
                    explosion.position.copy(player.position);
                    scene.add(explosion);
                    setTimeout(() => scene.remove(explosion), 300);
                    return;
                }
            }
            
            // Física de pulo
            if (isJumping) {
                jumpVelocity -= GRAVITY * deltaTime;
                playerY += jumpVelocity * deltaTime;
                if (playerY <= groundY) {
                    playerY = groundY;
                    isJumping = false;
                    jumpVelocity = 0;
                }
                player.position.y = playerY;
            } else {
                player.position.y = groundY;
            }
            
            // Pequena rotação do jogador ao pular
            if (isJumping) {
                player.rotation.x += 0.1;
                player.rotation.z += 0.05;
            } else {
                player.rotation.x *= 0.95;
                player.rotation.z *= 0.95;
            }
            
            // Atualizar posição do jogador em Z (ele fica fixo, mas a sensação é de movimento relativo)
            // Para dar impressão de corrida, movemos o cenário, mas o jogador permanece em Z = 0.
            // Resetamos a posição dos obstáculos quando passam muito além?
            // Ajuste de bounding: na verdade mantemos o jogador em Z=0, e obstáculos vêm em direção a ele.
            // Para evitar que obstáculos passem sem colidir, só verificamos intersecção com posição real.
            // Se algum obstáculo ultrapassar o jogador muito para trás, removemos.
            for (let i=0; i<obstacles.length; i++) {
                if (obstacles[i].mesh.position.z > 3.5) {
                    scene.remove(obstacles[i].mesh);
                    obstacles.splice(i,1);
                    i--;
                }
            }
            
            // Ajustar luz de chão pulsante
            groundGlow.intensity = 0.5 + Math.sin(Date.now() * 0.015) * 0.3;
            backLight.intensity = 0.5 + Math.sin(Date.now() * 0.02) * 0.4;
        }
        
        // --- Função restart ---
        function restartGame() {
            // Limpar obstáculos existentes
            for (let obs of obstacles) {
                scene.remove(obs.mesh);
            }
            obstacles.length = 0;
            // Resetar estado
            isGameOver = false;
            score = 0;
            speed = 5.5;
            playerY = 0.2;
            player.position.y = groundY;
            isJumping = false;
            jumpVelocity = 0;
            player.position.set(0, groundY, 0);
            player.rotation.set(0,0,0);
            document.getElementById('score-value').innerText = "0";
            document.getElementById('game-over').style.display = 'none';
            // Gerar novos obstáculos iniciais
            nextObstacleZ = -12;
            for (let i = 0; i < 8; i++) {
                let zPos = -3 - i * 1.8;
                const obs = createObstacle(zPos);
                obstacles.push(obs);
            }
            // Ajustar o nextObstacleZ
            nextObstacleZ = -12 - (obstacles.length * 1.5);
            generateObstaclesUntil(-25);
            // Resetar estrelas posição aleatória
            for (let star of starField) {
                star.position.z = (Math.random() - 0.5) * 60;
            }
            ring.position.z = -5;
        }
        
        // Botão restart
        document.getElementById('restart-btn').addEventListener('click', () => {
            restartGame();
        });
        
        // Inicializar obstáculos
        function initObstacles() {
            for (let i = 0; i < 8; i++) {
                let zPos = -3 - i * 1.8;
                const obs = createObstacle(zPos);
                obstacles.push(obs);
            }
            nextObstacleZ = -12 - (obstacles.length * 1.5);
            generateObstaclesUntil(-25);
        }
        initObstacles();
        
        // Pequenas partículas de poeira ao correr (efeito)
        const dustGeo = new THREE.SphereGeometry(0.05, 4, 4);
        const dustMat = new THREE.MeshStandardMaterial({ color: 0xffaa77 });
        const dustParticles = [];
        for (let i = 0; i < 40; i++) {
            const dust = new THREE.Mesh(dustGeo, dustMat);
            dust.visible = false;
            scene.add(dust);
            dustParticles.push(dust);
        }
        let dustIndex = 0;
        
        // Loop de animação
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (!isGameOver) {
                updateGame(delta);
                // Efeito de poeira durante corrida
                if (Math.random() < 0.4 && !isJumping) {
                    const p = dustParticles[dustIndex % dustParticles.length];
                    p.position.set((Math.random() - 0.5) * 1.2, 0.0, -0.8);
                    p.visible = true;
                    p.scale.setScalar(0.5 + Math.random() * 0.5);
                    setTimeout(() => { if(p) p.visible = false; }, 200);
                    dustIndex++;
                }
            }
            
            updateCamera();
            
            // Rodar anéis e efeitos
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Ajuste de janela responsiva
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        animate();
        
        // Instrução inicial no console
        console.log('Geometry Dash 3D iniciado! Clique, Espaço ou Toque para pular!');
    </script>
</body>
</html>
